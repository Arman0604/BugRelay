<svg xmlns="http://www.w3.org/2000/svg" width="1680" height="1000" viewBox="0 0 1680 1000" role="img" aria-labelledby="title desc">
  <title id="title">BugRelayAI High-Level Architecture</title>
  <desc id="desc">Full-stack BugRelayAI architecture showing user, browser frontend, Node server API layer, PostgreSQL data storage, RAG services, GitHub imports, optional OpenAI analysis, main flow, and ticket lifecycle.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset="1" stop-color="#ffffff"/>
    </linearGradient>
    <linearGradient id="blue-pill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4f8df7"/>
      <stop offset="1" stop-color="#1858d8"/>
    </linearGradient>
    <linearGradient id="teal-pill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#14b8a6"/>
      <stop offset="1" stop-color="#0f766e"/>
    </linearGradient>
    <linearGradient id="purple-pill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8b5cf6"/>
      <stop offset="1" stop-color="#6d28d9"/>
    </linearGradient>
    <linearGradient id="database" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#12b8a6"/>
      <stop offset="1" stop-color="#069487"/>
    </linearGradient>
    <filter id="shadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow-blue" markerWidth="12" markerHeight="12" refX="10" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,8 L11,4 z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-teal" markerWidth="12" markerHeight="12" refX="10" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,8 L11,4 z" fill="#0f766e"/>
    </marker>
    <marker id="arrow-purple" markerWidth="12" markerHeight="12" refX="10" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,8 L11,4 z" fill="#7c3aed"/>
    </marker>
    <style>
      .bg { fill: url(#bg); }
      .title { font: 800 56px Arial, sans-serif; fill: #07142f; letter-spacing: .3px; }
      .subtitle { font: 400 25px Arial, sans-serif; fill: #475569; }
      .panel-blue { fill: rgba(255,255,255,.94); stroke: #69a0ff; stroke-width: 2; filter: url(#shadow); }
      .panel-teal { fill: rgba(255,255,255,.94); stroke: #12b8a6; stroke-width: 2; filter: url(#shadow); }
      .panel-purple { fill: rgba(255,255,255,.94); stroke: #8b5cf6; stroke-width: 2; filter: url(#shadow); }
      .panel-orange { fill: rgba(255,255,255,.96); stroke: #fb923c; stroke-width: 2; filter: url(#shadow); }
      .card-blue { fill: #eff6ff; stroke: #9cc2ff; stroke-width: 1.8; }
      .card-teal { fill: #effdfa; stroke: #32d6c3; stroke-width: 1.8; }
      .card-purple { fill: #faf5ff; stroke: #c4b5fd; stroke-width: 1.8; }
      .number-blue { fill: url(#blue-pill); }
      .number-teal { fill: url(#teal-pill); }
      .number-purple { fill: url(#purple-pill); }
      .number-orange { fill: #fff7ed; stroke: #fb923c; stroke-width: 2; }
      .number-text { font: 800 23px Arial, sans-serif; fill: #ffffff; text-anchor: middle; dominant-baseline: middle; }
      .number-text-orange { font: 800 28px Arial, sans-serif; fill: #ea580c; text-anchor: middle; dominant-baseline: middle; }
      .heading { font: 800 20px Arial, sans-serif; fill: #0f172a; }
      .heading-blue { font: 800 20px Arial, sans-serif; fill: #1d4ed8; }
      .heading-teal { font: 800 20px Arial, sans-serif; fill: #0f766e; }
      .heading-purple { font: 800 20px Arial, sans-serif; fill: #6d28d9; }
      .heading-orange { font: 800 20px Arial, sans-serif; fill: #ea580c; }
      .label { font: 800 18px Arial, sans-serif; fill: #0f172a; }
      .body { font: 400 15px Arial, sans-serif; fill: #334155; }
      .tiny { font: 400 12.5px Arial, sans-serif; fill: #475569; }
      .mono { font: 400 14.5px Consolas, monospace; fill: #0f172a; }
      .icon-blue { font: 800 34px Arial, sans-serif; fill: #2563eb; text-anchor: middle; dominant-baseline: middle; }
      .icon-teal { font: 800 34px Arial, sans-serif; fill: #0f766e; text-anchor: middle; dominant-baseline: middle; }
      .icon-purple { font: 800 34px Arial, sans-serif; fill: #6d28d9; text-anchor: middle; dominant-baseline: middle; }
      .arrow-blue { fill: none; stroke: #2563eb; stroke-width: 3.2; marker-end: url(#arrow-blue); }
      .arrow-teal { fill: none; stroke: #0f766e; stroke-width: 3.2; marker-end: url(#arrow-teal); }
      .arrow-purple { fill: none; stroke: #7c3aed; stroke-width: 3.2; stroke-dasharray: 10 8; marker-end: url(#arrow-purple); }
      .divider { stroke: #bfdbfe; stroke-width: 2; stroke-dasharray: 5 8; }
    </style>
  </defs>

  <rect class="bg" width="1680" height="1000"/>

  <text x="840" y="58" class="title" text-anchor="middle">BugRelayAI - High-Level Architecture</text>
  <text x="840" y="102" class="subtitle" text-anchor="middle">Full-stack bug triage app with ticket management, GitHub import, and RAG-powered bug analysis</text>

  <rect x="24" y="142" width="172" height="650" rx="17" class="panel-blue"/>
  <circle cx="62" cy="181" r="19" class="number-blue"/>
  <text x="62" y="181" class="number-text">1</text>
  <text x="98" y="188" class="heading">User</text>
  <circle cx="108" cy="434" r="53" fill="#eff6ff" stroke="#69a0ff" stroke-width="2"/>
  <circle cx="108" cy="419" r="18" fill="#2563eb"/>
  <path d="M72 470c7-24 24-36 36-36s29 12 36 36z" fill="#2563eb"/>
  <text x="108" y="528" class="label" text-anchor="middle">User /</text>
  <text x="108" y="555" class="label" text-anchor="middle">Developer</text>
  <path d="M159 434h58" class="arrow-blue"/>

  <rect x="232" y="142" width="360" height="650" rx="17" class="panel-blue"/>
  <circle cx="272" cy="181" r="19" class="number-blue"/>
  <text x="272" y="181" class="number-text">2</text>
  <text x="335" y="188" class="heading-blue">Browser UI (Frontend)</text>
  <rect x="284" y="164" width="18" height="18" fill="none" stroke="#2563eb" stroke-width="4"/>

  <rect x="258" y="224" width="300" height="85" rx="12" class="card-blue"/>
  <rect x="286" y="255" width="18" height="18" fill="none" stroke="#2563eb" stroke-width="4"/>
  <text x="350" y="260" class="label">Auth UI</text>
  <text x="350" y="286" class="body">signup, login, session</text>

  <rect x="258" y="327" width="300" height="85" rx="12" class="card-blue"/>
  <path d="M297 381v-34m0 0l-9 10m9-10l9 10" fill="none" stroke="#2563eb" stroke-width="3"/>
  <text x="350" y="363" class="label">Upload and Analyze</text>
  <text x="350" y="389" class="body">paste code / logs</text>

  <rect x="258" y="430" width="300" height="85" rx="12" class="card-blue"/>
  <path d="M286 460h7v25h-7zm13 0h7v25h-7zm13 0h7v25h-7z" fill="none" stroke="#2563eb" stroke-width="3"/>
  <text x="350" y="466" class="label">Ticket Dashboard</text>
  <text x="350" y="492" class="body">view, create, update, stats</text>

  <rect x="258" y="533" width="300" height="85" rx="12" class="card-blue"/>
  <text x="301" y="580" class="icon-blue">GH</text>
  <text x="350" y="570" class="label">GitHub Import</text>
  <text x="350" y="596" class="body">fetch public issues</text>

  <rect x="258" y="636" width="300" height="85" rx="12" class="card-blue"/>
  <circle cx="295" cy="675" r="8" fill="none" stroke="#2563eb" stroke-width="3"/>
  <path d="M302 682l12 12" stroke="#2563eb" stroke-width="3"/>
  <text x="350" y="673" class="label">Client Analysis</text>
  <text x="350" y="699" class="body">parser + rules + TF-IDF</text>

  <line x1="252" y1="756" x2="568" y2="756" class="divider"/>
  <text x="410" y="779" class="body" text-anchor="middle">Stores JWT and cached views locally</text>

  <rect x="638" y="142" width="365" height="650" rx="17" class="panel-teal"/>
  <circle cx="676" cy="181" r="19" class="number-teal"/>
  <text x="676" y="181" class="number-text">3</text>
  <text x="736" y="188" class="heading-teal">Node Server / API Layer</text>
  <path d="M702 166h22m-22 8h22m-22 8h22" stroke="#0f766e" stroke-width="4"/>

  <rect x="688" y="224" width="254" height="85" rx="12" class="card-teal"/>
  <path d="M750 266l10-10 10 10-10 10z" fill="none" stroke="#0f766e" stroke-width="3"/>
  <text x="790" y="270" class="label">Auth API</text>

  <rect x="688" y="337" width="254" height="85" rx="12" class="card-teal"/>
  <rect x="751" y="375" width="14" height="14" fill="none" stroke="#0f766e" stroke-width="2"/>
  <text x="790" y="383" class="label">Ticket API</text>

  <rect x="688" y="462" width="254" height="155" rx="12" class="card-teal"/>
  <text x="815" y="513" class="icon-teal">&lt;/&gt;</text>
  <text x="815" y="548" class="label" text-anchor="middle">server.js</text>
  <text x="815" y="580" class="body" text-anchor="middle">Node HTTP Server</text>

  <rect x="688" y="660" width="254" height="78" rx="12" class="card-teal"/>
  <text x="747" y="704" class="icon-teal">AI</text>
  <text x="790" y="707" class="label">RAG API</text>

  <rect x="650" y="747" width="330" height="35" rx="9" fill="#f0fdfa" stroke="#99f6e4"/>
  <text x="815" y="770" class="tiny" text-anchor="middle">Auth, routes, persistence, tickets, approvals</text>

  <path d="M574 267h96" class="arrow-blue"/>
  <path d="M574 370h96" class="arrow-blue"/>
  <path d="M574 679h96" class="arrow-blue"/>
  <path d="M815 309v26" class="arrow-teal"/>
  <path d="M815 422v38" class="arrow-teal"/>
  <path d="M815 617v41" class="arrow-teal"/>

  <rect x="1056" y="142" width="372" height="650" rx="17" class="panel-teal"/>
  <circle cx="1094" cy="181" r="19" class="number-teal"/>
  <text x="1094" y="181" class="number-text">4</text>
  <text x="1144" y="188" class="heading-teal">Data and Intelligence</text>

  <rect x="1074" y="224" width="330" height="320" rx="12" class="card-teal"/>
  <text x="1100" y="258" class="heading-teal">A. Database</text>
  <ellipse cx="1144" cy="305" rx="37" ry="14" fill="#10b9a8"/>
  <path d="M1107 305v55c0 8 17 15 37 15s37-7 37-15v-55" fill="url(#database)" opacity=".9"/>
  <ellipse cx="1144" cy="360" rx="37" ry="14" fill="#0fc5b4"/>
  <text x="1205" y="329" class="label">PostgreSQL</text>
  <line x1="1102" y1="392" x2="1376" y2="392" class="divider"/>
  <circle cx="1112" cy="420" r="5" fill="#0f766e"/>
  <circle cx="1112" cy="448" r="5" fill="#0f766e"/>
  <circle cx="1112" cy="476" r="5" fill="#0f766e"/>
  <circle cx="1112" cy="504" r="5" fill="#0f766e"/>
  <circle cx="1112" cy="532" r="5" fill="#0f766e"/>
  <text x="1126" y="424" class="mono">users</text>
  <text x="1126" y="452" class="mono">tickets</text>
  <text x="1126" y="480" class="mono">solution_requests</text>
  <text x="1126" y="508" class="mono">ingestion_log</text>
  <text x="1126" y="536" class="mono">rag_documents</text>

  <rect x="1074" y="585" width="330" height="184" rx="12" class="card-teal"/>
  <text x="1100" y="620" class="heading-teal">B. RAG Services</text>
  <text x="1128" y="664" class="icon-teal">AI</text>
  <text x="1195" y="664" class="label">RAG Services</text>
  <text x="1098" y="715" class="tiny">ingest</text>
  <text x="1166" y="715" class="tiny">chunk</text>
  <text x="1235" y="715" class="tiny">embed</text>
  <text x="1302" y="715" class="tiny">retrieve</text>
  <text x="1360" y="715" class="tiny">analyze</text>
  <path d="M1156 696h38" class="arrow-teal"/>
  <path d="M1222 696h38" class="arrow-teal"/>
  <path d="M1288 696h38" class="arrow-teal"/>
  <path d="M1350 696h32" class="arrow-teal"/>
  <line x1="1102" y1="732" x2="1376" y2="732" class="divider"/>
  <text x="1239" y="755" class="tiny" text-anchor="middle">Works with OpenAI or local fallback</text>
  <path d="M1239 544v39" class="arrow-teal"/>

  <path d="M942 267h93" class="arrow-teal"/>
  <path d="M942 380h93" class="arrow-teal"/>
  <path d="M942 540c52 0 58-174 114-174" class="arrow-teal"/>
  <path d="M942 699h93" class="arrow-teal"/>

  <rect x="1456" y="142" width="200" height="650" rx="17" class="panel-purple"/>
  <circle cx="1494" cy="181" r="19" class="number-purple"/>
  <text x="1494" y="181" class="number-text">5</text>
  <text x="1530" y="188" class="heading-purple">External Sources</text>

  <rect x="1476" y="276" width="160" height="166" rx="14" class="card-purple"/>
  <text x="1556" y="334" class="icon-purple">GH</text>
  <text x="1556" y="387" class="label" text-anchor="middle">GitHub</text>
  <text x="1556" y="415" class="tiny" text-anchor="middle">issues, PRs, commits</text>

  <rect x="1476" y="610" width="160" height="166" rx="14" class="card-purple"/>
  <text x="1556" y="668" class="icon-purple">AI</text>
  <text x="1556" y="721" class="label" text-anchor="middle">OpenAI</text>
  <text x="1556" y="749" class="tiny" text-anchor="middle">optional analysis</text>

  <path d="M558 576h62" class="arrow-purple"/>
  <path d="M1404 397h52" class="arrow-blue"/>
  <path d="M1404 704h72" class="arrow-purple"/>
  <path d="M1476 692c-80 0-92-238 80-238v-12" class="arrow-purple"/>

  <rect x="24" y="820" width="1172" height="130" rx="15" class="panel-blue"/>
  <text x="610" y="854" class="heading-blue" text-anchor="middle">Main Flow</text>
  <line x1="52" y1="854" x2="438" y2="854" stroke="#60a5fa" stroke-width="3"/>
  <line x1="782" y1="854" x2="1162" y2="854" stroke="#60a5fa" stroke-width="3"/>
  <text x="86" y="910" class="icon-blue">1</text>
  <text x="160" y="900" class="tiny" text-anchor="middle">User signs in</text>
  <path d="M220 895h48" class="arrow-blue"/>
  <text x="292" y="910" class="icon-blue">2</text>
  <text x="370" y="891" class="tiny" text-anchor="middle">Uploads logs or</text>
  <text x="370" y="911" class="tiny" text-anchor="middle">imports GitHub issues</text>
  <path d="M460 895h48" class="arrow-blue"/>
  <text x="532" y="910" class="icon-blue">3</text>
  <text x="626" y="891" class="tiny" text-anchor="middle">Client analysis and</text>
  <text x="626" y="911" class="tiny" text-anchor="middle">server RAG search run</text>
  <path d="M742 895h48" class="arrow-blue"/>
  <text x="814" y="910" class="icon-blue">4</text>
  <text x="906" y="891" class="tiny" text-anchor="middle">Matches and analysis</text>
  <text x="906" y="911" class="tiny" text-anchor="middle">return to the UI</text>
  <path d="M1022 895h48" class="arrow-blue"/>
  <text x="1094" y="910" class="icon-blue">5</text>
  <text x="1142" y="891" class="tiny" text-anchor="middle">Tickets and fixes</text>
  <text x="1142" y="911" class="tiny" text-anchor="middle">stored in PostgreSQL</text>

  <rect x="1228" y="820" width="428" height="130" rx="15" class="panel-orange"/>
  <text x="1442" y="854" class="heading-orange" text-anchor="middle">Ticket Lifecycle</text>
  <circle cx="1284" cy="895" r="32" class="number-orange"/>
  <text x="1284" y="895" class="number-text-orange">1</text>
  <circle cx="1380" cy="895" r="32" class="number-orange"/>
  <text x="1380" y="895" class="number-text-orange">2</text>
  <circle cx="1476" cy="895" r="32" class="number-orange"/>
  <text x="1476" y="895" class="number-text-orange">3</text>
  <circle cx="1572" cy="895" r="32" class="number-orange"/>
  <text x="1572" y="895" class="number-text-orange">4</text>
  <path d="M1318 895h28" class="arrow-blue"/>
  <path d="M1414 895h28" class="arrow-blue"/>
  <path d="M1510 895h28" class="arrow-blue"/>
  <text x="1284" y="940" class="tiny" text-anchor="middle">Manual / GitHub / Log</text>
  <text x="1380" y="940" class="tiny" text-anchor="middle">Ticket updated</text>
  <text x="1476" y="940" class="tiny" text-anchor="middle">Fix request</text>
  <text x="1572" y="940" class="tiny" text-anchor="middle">Owner decides</text>
</svg>
