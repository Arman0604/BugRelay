<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980" role="img" aria-labelledby="title desc">
  <title id="title">BugRelayAI High-Level Architecture</title>
  <desc id="desc">Architecture diagram showing user, browser UI, Node API layer, PostgreSQL, RAG services, GitHub, and optional OpenAI integration.</desc>
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-teal" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#0f766e"/>
    </marker>
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <style>
      .bg { fill: #f8fbff; }
      .title { font: 800 52px Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 24px Arial, sans-serif; fill: #475569; }
      .panel { fill: #ffffff; stroke: #93c5fd; stroke-width: 2; filter: url(#soft-shadow); }
      .panel-teal { fill: #ffffff; stroke: #14b8a6; stroke-width: 2; filter: url(#soft-shadow); }
      .panel-purple { fill: #ffffff; stroke: #8b5cf6; stroke-width: 2; filter: url(#soft-shadow); }
      .panel-orange { fill: #ffffff; stroke: #fb923c; stroke-width: 2; filter: url(#soft-shadow); }
      .small-card { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; }
      .small-card-blue { fill: #eff6ff; stroke: #bfdbfe; stroke-width: 2; }
      .small-card-teal { fill: #f0fdfa; stroke: #5eead4; stroke-width: 2; }
      .small-card-purple { fill: #faf5ff; stroke: #c4b5fd; stroke-width: 2; }
      .num { fill: #2563eb; }
      .num-teal { fill: #0f766e; }
      .num-purple { fill: #6d28d9; }
      .num-orange { fill: #ea580c; }
      .num-text { font: 700 24px Arial, sans-serif; fill: #ffffff; text-anchor: middle; dominant-baseline: middle; }
      .section-title { font: 700 20px Arial, sans-serif; fill: #0f172a; }
      .section-title-blue { font: 700 20px Arial, sans-serif; fill: #1d4ed8; }
      .section-title-teal { font: 700 20px Arial, sans-serif; fill: #0f766e; }
      .section-title-purple { font: 700 20px Arial, sans-serif; fill: #6d28d9; }
      .section-title-orange { font: 700 20px Arial, sans-serif; fill: #ea580c; }
      .label { font: 700 18px Arial, sans-serif; fill: #0f172a; }
      .body { font: 400 15px Arial, sans-serif; fill: #334155; }
      .tiny { font: 400 13px Arial, sans-serif; fill: #475569; }
      .mono { font: 400 15px Consolas, monospace; fill: #0f172a; }
      .arrow { fill: none; stroke: #2563eb; stroke-width: 3; marker-end: url(#arrow-blue); }
      .arrow-teal { fill: none; stroke: #0f766e; stroke-width: 3; marker-end: url(#arrow-teal); }
      .arrow-dash { fill: none; stroke: #6d28d9; stroke-width: 3; stroke-dasharray: 9 8; marker-end: url(#arrow-blue); }
      .muted-line { stroke: #bfdbfe; stroke-width: 2; stroke-dasharray: 4 6; }
      .icon { font: 700 34px Arial, sans-serif; text-anchor: middle; dominant-baseline: middle; fill: #2563eb; }
      .icon-teal { font: 700 32px Arial, sans-serif; text-anchor: middle; dominant-baseline: middle; fill: #0f766e; }
      .icon-purple { font: 700 32px Arial, sans-serif; text-anchor: middle; dominant-baseline: middle; fill: #6d28d9; }
      .icon-orange { font: 700 30px Arial, sans-serif; text-anchor: middle; dominant-baseline: middle; fill: #ea580c; }
    </style>
  </defs>

  <rect class="bg" width="1600" height="980"/>
  <text x="800" y="62" class="title" text-anchor="middle">BugRelayAI - High-Level Architecture</text>
  <text x="800" y="104" class="subtitle" text-anchor="middle">Full-stack bug triage app with ticket management, GitHub import, and RAG-powered bug analysis</text>

  <rect x="28" y="145" width="160" height="640" rx="16" class="panel"/>
  <circle cx="65" cy="184" r="18" class="num"/>
  <text x="65" y="184" class="num-text">1</text>
  <text x="98" y="191" class="section-title">User</text>
  <circle cx="108" cy="430" r="50" fill="#eff6ff" stroke="#93c5fd" stroke-width="2"/>
  <circle cx="108" cy="415" r="17" fill="#2563eb"/>
  <path d="M73 466c7-23 24-34 35-34s28 11 35 34z" fill="#2563eb"/>
  <text x="108" y="520" class="label" text-anchor="middle">User /</text>
  <text x="108" y="545" class="label" text-anchor="middle">Developer</text>
  <path d="M152 430h48" class="arrow"/>

  <rect x="220" y="145" width="340" height="640" rx="16" class="panel"/>
  <circle cx="252" cy="184" r="18" class="num"/>
  <text x="252" y="184" class="num-text">2</text>
  <text x="320" y="191" class="section-title-blue">Browser UI (Frontend)</text>
  <text x="280" y="180" class="icon">▣</text>

  <rect x="245" y="225" width="285" height="84" rx="12" class="small-card-blue"/>
  <text x="335" y="260" class="label">Auth UI</text>
  <text x="335" y="284" class="body">signup, login, session</text>
  <text x="282" y="268" class="icon">▣</text>

  <rect x="245" y="328" width="285" height="84" rx="12" class="small-card-blue"/>
  <text x="335" y="363" class="label">Upload and Analyze</text>
  <text x="335" y="387" class="body">paste code / logs</text>
  <text x="282" y="371" class="icon">↑</text>

  <rect x="245" y="431" width="285" height="84" rx="12" class="small-card-blue"/>
  <text x="335" y="466" class="label">Ticket Dashboard</text>
  <text x="335" y="490" class="body">view, create, update, stats</text>
  <text x="282" y="474" class="icon">▥</text>

  <rect x="245" y="534" width="285" height="84" rx="12" class="small-card-blue"/>
  <text x="335" y="569" class="label">GitHub Import</text>
  <text x="335" y="593" class="body">fetch public issues</text>
  <text x="282" y="578" class="icon">GH</text>

  <rect x="245" y="637" width="285" height="84" rx="12" class="small-card-blue"/>
  <text x="335" y="672" class="label">Client Analysis</text>
  <text x="335" y="696" class="body">parser + rules + TF-IDF</text>
  <text x="282" y="681" class="icon">⌕</text>
  <line x1="240" y1="753" x2="535" y2="753" class="muted-line"/>
  <text x="265" y="775" class="body">Stores JWT and cached views locally</text>

  <rect x="600" y="145" width="330" height="640" rx="16" class="panel-teal"/>
  <circle cx="632" cy="184" r="18" class="num-teal"/>
  <text x="632" y="184" class="num-text">3</text>
  <text x="690" y="191" class="section-title-teal">Node Server / API Layer</text>
  <text x="655" y="180" class="icon-teal">▤</text>

  <rect x="650" y="225" width="230" height="78" rx="12" class="small-card-teal"/>
  <text x="745" y="270" class="label">Auth API</text>
  <text x="710" y="268" class="icon-teal">◇</text>

  <rect x="650" y="328" width="230" height="78" rx="12" class="small-card-teal"/>
  <text x="745" y="373" class="label">Ticket API</text>
  <text x="710" y="371" class="icon-teal">□</text>

  <rect x="650" y="450" width="230" height="150" rx="12" class="small-card-teal"/>
  <text x="765" y="526" class="section-title">server.js</text>
  <text x="765" y="560" class="body" text-anchor="middle">Node HTTP Server</text>
  <text x="765" y="495" class="icon-teal">&lt;/&gt;</text>

  <rect x="650" y="638" width="230" height="78" rx="12" class="small-card-teal"/>
  <text x="745" y="683" class="label">RAG API</text>
  <text x="710" y="681" class="icon-teal">AI</text>

  <rect x="615" y="725" width="300" height="48" rx="10" fill="#f0fdfa" stroke="#99f6e4"/>
  <text x="765" y="748" class="tiny" text-anchor="middle">Handles auth, route dispatch, persistence,</text>
  <text x="765" y="767" class="tiny" text-anchor="middle">ticket lifecycle, and solution approval</text>

  <path d="M545 267h85" class="arrow"/>
  <path d="M545 370h85" class="arrow"/>
  <path d="M545 679h85" class="arrow"/>
  <path d="M765 303v24" class="arrow-teal"/>
  <path d="M765 406v42" class="arrow-teal"/>
  <path d="M765 600v36" class="arrow-teal"/>

  <rect x="970" y="145" width="370" height="640" rx="16" class="panel-teal"/>
  <circle cx="1002" cy="184" r="18" class="num-teal"/>
  <text x="1002" y="184" class="num-text">4</text>
  <text x="1060" y="191" class="section-title-teal">Data and Intelligence</text>

  <rect x="986" y="225" width="330" height="300" rx="12" class="small-card-teal"/>
  <text x="1006" y="258" class="section-title-teal">A. Database</text>
  <ellipse cx="1058" cy="302" rx="36" ry="14" fill="#14b8a6"/>
  <path d="M1022 302v50c0 8 16 15 36 15s36-7 36-15v-50" fill="#0f766e" opacity="0.85"/>
  <ellipse cx="1058" cy="352" rx="36" ry="14" fill="#14b8a6"/>
  <text x="1115" y="324" class="label">PostgreSQL</text>
  <line x1="1018" y1="382" x2="1288" y2="382" class="muted-line"/>
  <text x="1025" y="414" class="mono">users</text>
  <text x="1025" y="442" class="mono">tickets</text>
  <text x="1025" y="470" class="mono">solution_requests</text>
  <text x="1025" y="498" class="mono">ingestion_log</text>
  <text x="1025" y="526" class="mono">rag_documents</text>
  <circle cx="1015" cy="410" r="5" fill="#0f766e"/>
  <circle cx="1015" cy="438" r="5" fill="#0f766e"/>
  <circle cx="1015" cy="466" r="5" fill="#0f766e"/>
  <circle cx="1015" cy="494" r="5" fill="#0f766e"/>
  <circle cx="1015" cy="522" r="5" fill="#0f766e"/>

  <rect x="986" y="570" width="330" height="195" rx="12" class="small-card-teal"/>
  <text x="1006" y="604" class="section-title-teal">B. RAG Services</text>
  <text x="1115" y="655" class="label">RAG Services</text>
  <text x="1055" y="650" class="icon-teal">AI</text>
  <text x="1018" y="706" class="body">ingest</text>
  <text x="1088" y="706" class="body">chunk</text>
  <text x="1160" y="706" class="body">embed</text>
  <text x="1232" y="706" class="body">retrieve</text>
  <text x="1288" y="706" class="body">analyze</text>
  <path d="M1070 685h38" class="arrow-teal"/>
  <path d="M1135 685h38" class="arrow-teal"/>
  <path d="M1200 685h38" class="arrow-teal"/>
  <path d="M1262 685h38" class="arrow-teal"/>
  <line x1="1018" y1="722" x2="1288" y2="722" class="muted-line"/>
  <text x="1150" y="748" class="tiny" text-anchor="middle">Works with OpenAI or local fallback</text>
  <path d="M1148 525v44" class="arrow-teal"/>

  <path d="M880 525c38 0 48-185 90-185" class="arrow"/>
  <path d="M880 677h90" class="arrow"/>

  <rect x="1365" y="145" width="210" height="640" rx="16" class="panel-purple"/>
  <circle cx="1397" cy="184" r="18" class="num-purple"/>
  <text x="1397" y="184" class="num-text">5</text>
  <text x="1432" y="191" class="section-title-purple">External Sources</text>

  <rect x="1383" y="272" width="170" height="165" rx="14" class="small-card-purple"/>
  <text x="1468" y="326" class="icon-purple">GH</text>
  <text x="1468" y="382" class="label" text-anchor="middle">GitHub</text>
  <text x="1468" y="410" class="body" text-anchor="middle">issues, PRs, commits</text>

  <rect x="1383" y="602" width="170" height="165" rx="14" class="small-card-purple"/>
  <text x="1468" y="656" class="icon-purple">AI</text>
  <text x="1468" y="712" class="label" text-anchor="middle">OpenAI</text>
  <text x="1468" y="740" class="body" text-anchor="middle">optional analysis</text>

  <path d="M530 576h70" class="arrow-dash"/>
  <path d="M1316 393h48" class="arrow-dash"/>
  <path d="M1340 705h43" class="arrow-dash"/>
  <path d="M1383 684c-60 0-60-230 85-230v-18" class="arrow-dash"/>

  <rect x="28" y="815" width="1090" height="125" rx="14" class="panel"/>
  <text x="573" y="850" class="section-title-blue" text-anchor="middle">Main Flow</text>
  <line x1="58" y1="850" x2="410" y2="848" stroke="#60a5fa" stroke-width="3"/>
  <line x1="735" y1="848" x2="1088" y2="850" stroke="#60a5fa" stroke-width="3"/>
  <text x="90" y="905" class="icon">1</text>
  <text x="160" y="895" class="body" text-anchor="middle">User signs in</text>
  <path d="M215 885h45" class="arrow"/>
  <text x="285" y="905" class="icon">2</text>
  <text x="345" y="885" class="body" text-anchor="middle">Uploads logs or</text>
  <text x="345" y="907" class="body" text-anchor="middle">imports GitHub issues</text>
  <path d="M435 885h45" class="arrow"/>
  <text x="505" y="905" class="icon">3</text>
  <text x="585" y="885" class="body" text-anchor="middle">Client analysis and</text>
  <text x="585" y="907" class="body" text-anchor="middle">server RAG search run</text>
  <path d="M700 885h45" class="arrow"/>
  <text x="770" y="905" class="icon">4</text>
  <text x="850" y="885" class="body" text-anchor="middle">Matches and analysis</text>
  <text x="850" y="907" class="body" text-anchor="middle">return to the UI</text>
  <path d="M960 885h45" class="arrow"/>
  <text x="1030" y="905" class="icon">5</text>
  <text x="1048" y="885" class="body">Tickets and fixes</text>
  <text x="1048" y="907" class="body">stored in PostgreSQL</text>

  <rect x="1145" y="815" width="430" height="125" rx="14" class="panel-orange"/>
  <text x="1360" y="848" class="section-title-orange" text-anchor="middle">Ticket Lifecycle</text>
  <circle cx="1205" cy="885" r="32" fill="#fff7ed" stroke="#fb923c" stroke-width="2"/>
  <text x="1205" y="886" class="icon-orange">1</text>
  <circle cx="1300" cy="885" r="32" fill="#fff7ed" stroke="#fb923c" stroke-width="2"/>
  <text x="1300" y="886" class="icon-orange">2</text>
  <circle cx="1395" cy="885" r="32" fill="#fff7ed" stroke="#fb923c" stroke-width="2"/>
  <text x="1395" y="886" class="icon-orange">3</text>
  <circle cx="1490" cy="885" r="32" fill="#fff7ed" stroke="#fb923c" stroke-width="2"/>
  <text x="1490" y="886" class="icon-orange">4</text>
  <path d="M1238 885h28" class="arrow"/>
  <path d="M1333 885h28" class="arrow"/>
  <path d="M1428 885h28" class="arrow"/>
  <text x="1205" y="935" class="tiny" text-anchor="middle">Manual / GitHub / Logs</text>
  <text x="1300" y="935" class="tiny" text-anchor="middle">Ticket updated</text>
  <text x="1395" y="935" class="tiny" text-anchor="middle">Fix request</text>
  <text x="1490" y="935" class="tiny" text-anchor="middle">Owner decides</text>
</svg>
